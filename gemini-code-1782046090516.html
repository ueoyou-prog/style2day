<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CLOSET — 개인 맞춤형 스타일링 저널</title>
    <style>
        :root {
            --bg-sand: #FBFBFA;
            --card-bg: #FFFFFF;
            --accent-charcoal: #1A1A1A;
            --muted-gray: #767676;
            --light-border: #EAE4D9;
            --soft-oatmeal: #F5F2EB;
            --point-green: #4A5D4E;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            letter-spacing: -0.02em;
        }

        body { 
            background-color: var(--bg-sand); 
            color: var(--accent-charcoal); 
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
        }

        /* 헤더 감성 타이포그래피 */
        header {
            text-align: center;
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            color: var(--accent-charcoal);
            margin-bottom: 8px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--muted-gray);
            letter-spacing: 0.05em;
        }

        /* 카드 모던 레이아웃 */
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--light-border);
            border-radius: 12px; 
            padding: 30px; 
            margin-bottom: 35px; 
            box-shadow: 0 4px 20px rgba(26, 26, 26, 0.02);
        }

        h2 { 
            font-size: 1.1rem; 
            font-weight: 500;
            margin-bottom: 25px; 
            color: var(--accent-charcoal); 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 폼 요소 스타일링 */
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-charcoal);
            text-transform: uppercase;
        }

        input[type="text"], input[type="password"], input[type="number"], select {
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--light-border); 
            border-radius: 6px; 
            font-size: 0.9rem;
            background-color: #FAFAFA;
            color: var(--accent-charcoal);
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-charcoal);
            background-color: #FFF;
        }

        /* 체크박스 커스텀 칩 */
        .checkbox-group { 
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px; 
        }
        
        .checkbox-group label { 
            display: flex;
            align-items: center;
            background: var(--soft-oatmeal);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: normal; 
            font-size: 0.85rem;
            cursor: pointer; 
            transition: all 0.2s ease;
        }

        .checkbox-group input { margin-right: 6px; accent-color: var(--accent-charcoal); }

        /* 무드 있는 버튼 시스템 */
        button {
            background-color: var(--accent-charcoal); 
            color: white; 
            border: none; 
            padding: 14px 20px; 
            border-radius: 6px;
            cursor: pointer; 
            font-weight: 500;
            font-size: 0.9rem; 
            width: 100%;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        button:hover { background-color: #333333; opacity: 0.9; }
        
        .btn-filter {
            background: none;
            color: var(--muted-gray);
            border: 1px solid var(--light-border);
            padding: 6px 14px;
            border-radius: 20px;
            width: auto;
            font-size: 0.8rem;
        }
        .btn-filter.active, .btn-filter:hover {
            background: var(--accent-charcoal);
            color: white;
            border-color: var(--accent-charcoal);
        }

        .btn-danger { 
            background-color: transparent; 
            color: #C94A4A; 
            border: 1px solid #F2DEDE;
            width: auto;
            padding: 4px 10px;
            font-size: 0.75rem;
        }
        .btn-danger:hover { background-color: #FFF5F5; }

        /* 테이블 매핑 구조를 그리드로 감각적인 정렬 */
        .grid-closet { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
        }
        
        .grid-item { 
            background: #FFF; 
            border: 1px solid var(--light-border); 
            border-radius: 8px; 
            padding: 12px; 
            text-align: center; 
            transition: transform 0.2s ease;
        }
        .grid-item:hover { transform: translateY(-3px); }

        .closet-img { 
            width: 100%; 
            height: 160px; 
            object-fit: contain; 
            background: var(--soft-oatmeal); 
            border-radius: 6px; 
            margin-bottom: 12px; 
        }

        /* 스타일링 추천 카드 뷰 */
        .grid-recommend { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; 
        }
        
        .recommend-item { 
            background: var(--soft-oatmeal); 
            border: 1px solid var(--light-border); 
            border-radius: 10px; 
            padding: 24px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .recommend-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--point-green);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 15px;
        }

        .status-box { 
            background: var(--soft-oatmeal); 
            padding: 16px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            font-size: 0.85rem; 
            color: #555;
            border-left: 2px solid var(--accent-charcoal);
        }

        .tag { 
            display: inline-block; 
            background: #FAFAFA; 
            border: 1px solid var(--light-border);
            border-radius: 4px; 
            padding: 2px 8px; 
            font-size: 0.75rem; 
            margin: 2px; 
            color: var(--muted-gray);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>The Closet</h1>
        <p>오늘의 날씨와 시선을 읽는 스마트 의류 아카이브 & 저널</p>
    </header>

    <div class="card">
        <h2>🌤️ Weather Briefing</h2>
        <div class="status-box" id="weather-status">기상 정보를 수집하는 중입니다. 브라우저 위치 권한을 승인해주세요.</div>
        <button onclick="initLocationAndWeather()" style="background: none; color: var(--accent-charcoal); border: 1px solid var(--accent-charcoal); width: auto; font-size: 0.8rem; padding: 8px 16px; border-radius: 20px; margin: 0 auto; display: block;">🔄 데이터 동기화</button>
    </div>

    <div class="card">
        <h2>👤 Identity & Preference</h2>
        <form id="user-form" onsubmit="saveUserProfile(event)">
            <div class="form-group">
                <label>Account ID</label>
                <input type="text" id="user-id" value="minimalist_01" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="user-pw" value="journalpass77!" required>
            </div>
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1;">
                    <label>Gender</label>
                    <select id="user-gender"><option value="남성">남성</option><option value="여성">여성</option></select>
                </div>
                <div style="flex: 1;">
                    <label>Height (cm)</label>
                    <input type="number" id="user-height" value="178" required>
                </div>
                <div style="flex: 1;">
                    <label>Weight (kg)</label>
                    <input type="number" id="user-weight" value="68" required>
                </div>
            </div>
            <div class="form-group">
                <label>Silhouette</label>
                <select id="user-bodytype">
                    <option value="슬림">슬림 피트 (Slim)</option>
                    <option value="보통" selected>레귤러 피트 (Regular)</option>
                    <option value="근육질">에슬레틱 피체 (Athletic)</option>
                    <option value="통통">루즈 오버핏 (Heavy)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Style Mood Tag</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="style-tag" value="미니멀" checked> 미니멀</label>
                    <label><input type="checkbox" name="style-tag" value="캐주얼" checked> 캐주얼</label>
                    <label><input type="checkbox" name="style-tag" value="댄디"> 댄디</label>
                    <label><input type="checkbox" name="style-tag" value="스트릿"> 스트릿</label>
                    <label><input type="checkbox" name="style-tag" value="아메카지"> 아메카지</label>
                </div>
            </div>
            <button type="submit">Update Preference Profile</button>
        </form>
    </div>

    <div class="card">
        <h2>👗 Archive New Garment</h2>
        <form id="clothing-form" onsubmit="registerClothing(event)">
            <div class="form-group">
                <label>Garment Image</label>
                <input type="file" id="clothing-file" accept="image/*" required onchange="handleImageProcessing(event)">
                <div style="margin-top: 6px; font-size: 0.8rem; color: var(--point-green);" id="rembg-status"></div>
                <canvas id="preview-canvas" style="display:none; max-width:120px; margin-top:12px; border:1px solid var(--light-border); border-radius: 6px;"></canvas>
            </div>
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label>Category</label>
                    <select id="cloth-category" required>
                        <option value="상의">상의</option>
                        <option value="하의">하의</option>
                        <option value="아우터">아우터</option>
                        <option value="신발">신발</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Color Tone</label>
                    <select id="cloth-color" required>
                        <option value="블랙">블랙 (Black)</option>
                        <option value="화이트">화이트 (White)</option>
                        <option value="그레이">그레이 (Grey)</option>
                        <option value="네이비">네이비 (Navy)</option>
                        <option value="베이지">베이지 (Beige)</option>
                        <option value="데님">데님 (Denim)</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label>Thickness</label>
                    <select id="cloth-thickness" required>
                        <option value="얇음">얇음 (Light)</option>
                        <option value="보통" selected>보통 (Medium)</option>
                        <option value="두꺼움">두꺼움 (Heavy)</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Season</label>
                    <select id="cloth-season" required>
                        <option value="봄/가을">봄 / 가을</option>
                        <option value="여름">여름</option>
                        <option value="겨울">겨울</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Design Mood Match</label>
                <select id="cloth-style" required>
                    <option value="미니멀">미니멀</option>
                    <option value="캐주얼">캐주얼</option>
                    <option value="댄디">댄디</option>
                    <option value="스트릿">스트릿</option>
                    <option value="아메카지">아메카지</option>
                </select>
            </div>
            <button type="submit" style="background-color: var(--point-green);">Save into Closet</button>
        </form>
    </div>

    <div class="card">
        <h2>🗂️ My Closet Collection</h2>
        <div style="margin-bottom: 25px; display: flex; gap: 6px; flex-wrap: wrap;">
            <button class="btn-filter active" onclick="filterToggle(this, '전체')">전체</button>
            <button class="btn-filter" onclick="filterToggle(this, '상의')">상의</button>
            <button class="btn-filter" onclick="filterToggle(this, '하의')">하의</button>
            <button class="btn-filter" onclick="filterToggle(this, '아우터')">아우터</button>
            <button class="btn-filter" onclick="filterToggle(this, '신발')">신발</button>
        </div>
        <div id="closet-container"></div>
    </div>

    <div class="card" style="border: 1px solid var(--accent-charcoal);">
        <h2>🌿 Curated Styling Lookbook</h2>
        <div style="margin-bottom: 25px;">
            <button onclick="generateAIRecommendations()" style="background-color: var(--accent-charcoal); font-size: 0.95rem; padding: 16px;">오늘 기온을 기반으로 어울리는 연출 제안하기</button>
        </div>
        <div id="recommendation-container"></div>
    </div>

    <div class="card">
        <h2>📜 Wear History Logs</h2>
        <div id="history-container" style="font-size: 0.85rem; color: var(--muted-gray);">기록된 매칭 내역이 없습니다.</div>
    </div>
</div>

<script>
// 기존 기능 데이터 바인딩 완벽 유지
let userProfile = { id: "minimalist_01", gender: "남성", height: 178, weight: 68, bodyType: "보통", preferredStyles: ["미니멀", "캐주얼"] };
let currentCondition = { temp: 16, sky: "맑음", lat: 37.5665, lon: 126.9780 };
let myCloset = [
    { id: 1, category: "상의", color: "블랙", thickness: "보통", season: "봄/가을", style: "미니멀", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%231A1A1A'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23FFF' font-size='10'>Black Knit</text></svg>" },
    { id: 2, category: "상의", color: "화이트", thickness: "얇음", season: "여름", style: "미니멀", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%23F5F5F5' stroke='%23EAE4D9'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23333' font-size='10'>White Tee</text></svg>" },
    { id: 3, category: "하의", color: "그레이", thickness: "보통", season: "봄/가을", style: "미니멀", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%23767676'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23FFF' font-size='10'>Grey Slacks</text></svg>" },
    { id: 4, category: "아우터", color: "베이지", thickness: "보통", season: "봄/가을", style: "댄디", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%23EAE4D9'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%231A1A1A' font-size='10'>Beige Coat</text></svg>" },
    { id: 5, category: "신발", color: "블랙", thickness: "보통", season: "봄/가을", style: "미니멀", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%231A1A1A'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23FFF' font-size='10'>Derby Shoes</text></svg>" }
];
let userHistory = [];
let uploadedImageBase64 = "";

const colorMatchingRules = {
    "블랙": ["화이트", "그레이", "데님", "베이지", "블랙"],
    "화이트": ["블랙", "데님", "네이비", "그레이", "베이지"],
    "그레이": ["블랙", "화이트", "네이비", "데님"],
    "네이비": ["화이트", "베이지", "그레이", "데님"],
    "베이지": ["블랙", "네이비", "화이트"],
    "데님": ["화이트", "블랙", "그레이", "베이지"]
};

window.onload = function() {
    initLocationAndWeather();
    renderCloset('전체');
};

function initLocationAndWeather() {
    const statusDiv = document.getElementById("weather-status");
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                currentCondition.lat = position.coords.latitude.toFixed(4);
                currentCondition.lon = position.coords.longitude.toFixed(4);
                const mockTemps = [6, 12, 18, 24];
                currentCondition.temp = mockTemps[Math.floor(Math.random() * mockTemps.length)];
                statusDiv.innerHTML = `📍 대기 정보 동기화 완료: 위도 ${currentCondition.lat}, 경도 ${currentCondition.lon} <br>🌤️ 금일 외부 환경 기온: <strong>${currentCondition.temp}℃</strong> / 대기 흐름: <strong>${currentCondition.sky}</strong>`;
            },
            () => {
                statusDiv.innerHTML = `🌤️ 기본 설정 기준 기동 중: 서울 메인 좌표 기준 <br>🌡️ 현재 필터 적용 기온: <strong>${currentCondition.temp}℃</strong>`;
            }
        );
    }
}

function saveUserProfile(e) {
    e.preventDefault();
    const id = document.getElementById("user-id").value;
    if(id.length < 4 || /[\{\}\[\]\/?.,;:|\)*~`!^\-_+<>@\#$%&\\\=\(\'\"]/g.test(id)) { alert("ID 유효성 가이드라인을 맞춰주십시오."); return; }
    
    userProfile.id = id;
    userProfile.gender = document.getElementById("user-gender").value;
    userProfile.height = parseInt(document.getElementById("user-height").value);
    userProfile.weight = parseInt(document.getElementById("user-weight").value);
    userProfile.bodyType = document.getElementById("user-bodytype").value;
    
    const checkboxes = document.querySelectorAll('input[name="style-tag"]:checked');
    userProfile.preferredStyles = Array.from(checkboxes).map(cb => cb.value);
    alert("개인 선호 프로필 저널 갱신 완료.");
}

function handleImageProcessing(event) {
    const file = event.target.files[0];
    const statusLabel = document.getElementById("rembg-status");
    const canvas = document.getElementById("preview-canvas");
    const ctx = canvas.getContext("2d");
    if (!file) return;
    statusLabel.innerHTML = "배경 디테일 투명 투과 처리 프로세스 구동 중...";
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            canvas.width = 100; canvas.height = 100;
            ctx.drawImage(img, 0, 0, 100, 100);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) data[i+3] = 0;
            }
            ctx.putImageData(imgData, 0, 0);
            uploadedImageBase64 = canvas.toDataURL();
            canvas.style.display = "block";
            statusLabel.innerHTML = "의류 누끼 아웃라인 추출 처리 마감.";
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function registerClothing(e) {
    e.preventDefault();
    const category = document.getElementById("cloth-category").value;
    const color = document.getElementById("cloth-color").value;
    const newItem = {
        id: Date.now(),
        category: category,
        color: color,
        thickness: document.getElementById("cloth-thickness").value,
        season: document.getElementById("cloth-season").value,
        style: document.getElementById("cloth-style").value,
        img: uploadedImageBase64 || `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%23EAE4D9'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%231A1A1A' font-size='10'>${category}</text></svg>`
    };
    myCloset.push(newItem);
    document.getElementById("clothing-form").reset();
    document.getElementById("preview-canvas").style.display = "none";
    uploadedImageBase64 = "";
    document.getElementById("rembg-status").innerHTML = "";
    renderCloset('전체');
}

function filterToggle(btn, category) {
    document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCloset(category);
}

function renderCloset(filterCategory) {
    const container = document.getElementById("closet-container");
    container.innerHTML = "";
    const filtered = filterCategory === '전체' ? myCloset : myCloset.filter(item => item.category === filterCategory);
    
    if(filtered.length === 0) {
        container.innerHTML = "<p style='font-size:0.85rem; color:var(--muted-gray);'>아카이빙된 아이템이 존재하지 않습니다.</p>";
        return;
    }
    
    let html = '<div class="grid-closet">';
    filtered.forEach(item => {
        html += `
            <div class="grid-item">
                <img src="${item.img}" class="closet-img">
                <div style="font-weight:500; font-size:0.8rem; margin-bottom:4px;">${item.category} [${item.color}]</div>
                <div style="margin-bottom:8px;"><span class="tag">${item.style}</span></div>
                <button class="btn-danger" onclick="deleteClothing(${item.id})">Remove</button>
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
}

function deleteClothing(id) {
    if(confirm("해당 가먼트를 영구 삭제합니까?")) {
        myCloset = myCloset.filter(item => item.id !== id);
        renderCloset('전체');
    }
}

function generateAIRecommendations() {
    const container = document.getElementById("recommendation-container");
    container.innerHTML = "";
    const temp = currentCondition.temp;
    let targetThickness = "보통";
    let outerRequired = true;
    
    if (temp <= 5) { targetThickness = "두꺼움"; outerRequired = true; }
    else if (temp > 22) { targetThickness = "얇음"; outerRequired = false; }
    
    let finalTops = myCloset.filter(i => i.category === "상의" && userProfile.preferredStyles.includes(i.style));
    let finalBottoms = myCloset.filter(i => i.category === "하의");
    if(finalTops.length === 0) finalTops = myCloset.filter(i => i.category === "상의");
    
    let recommendationSets = [];
    for(let k=0; k<3; k++) {
        if(finalTops.length === 0 || finalBottoms.length === 0) break;
        let topPick = finalTops[Math.floor(Math.random() * finalTops.length)];
        let matchedBottoms = finalBottoms.filter(b => (colorMatchingRules[topPick.color] || []).includes(b.color));
        let bottomPick = matchedBottoms.length > 0 ? matchedBottoms[Math.floor(Math.random() * matchedBottoms.length)] : finalBottoms[Math.floor(Math.random() * finalBottoms.length)];
        let outerPick = outerRequired ? myCloset.find(i => i.category === "아우터") : null;
        let shoePick = myCloset.find(i => i.category === "신발");
        
        recommendationSets.push({ setId: k+1, top: topPick, bottom: bottomPick, outer: outerPick, shoe: shoePick });
    }
    
    let html = '<div class="grid-recommend">';
    recommendationSets.forEach(set => {
        html += `
            <div class="recommend-item">
                <div>
                    <div class="recommend-title">Look Option 0${set.setId}</div>
                    <div style="font-size:0.85rem; color:#444; line-height:1.8; margin-bottom:20px;">
                        🧥 아우터: ${set.outer ? set.outer.color + ' ' + set.outer.style : '제외 밸런스'}<br>
                        👕 상의: ${set.top.color} ${set.top.style}<br>
                        👖 하의: ${set.bottom.color} ${set.bottom.style}<br>
                        <span>🍃 레이어 점수 및 무드 조화 부합 완료</span>
                    </div>
                </div>
                <button onclick="applyOutfit(${set.setId})" style="background:var(--accent-charcoal); font-size:0.8rem;">Select Look</button>
            </div>
        `;
    });
    html += '</div>';
    container.innerHTML = html;
}

function applyOutfit(setId) {
    const today = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
    userHistory.unshift({ date: today, log: `Look Option 0${setId} 피팅 및 매칭 로그 보관 완료` });
    
    let html = "<ul style='padding-left:15px; line-height:2;'>";
    userHistory.forEach(h => html += `<li>📌 <b>${h.date}</b> — ${h.log}</li>`);
    html += "</ul>";
    document.getElementById("history-container").innerHTML = html;
    alert("오늘의 룩 기록이 완료되었습니다.");
}
</script>
